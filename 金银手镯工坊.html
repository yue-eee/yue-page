<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金银手镯工坊 — 手工定制</title>
<style>
:root {
  --bg: #1c1410;
  --surface: #2a1f18;
  --gold: #c9a23b;
  --gold-bright: #f2d279;
  --silver: #b8b8c0;
  --silver-bright: #e8e8f2;
  --text: #d4c8b8;
  --text-dim: #8a7e6e;
  --border: #3a2d20;
  --danger: #c4726a;
  --wood: #5c3d2e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'PingFang SC','Noto Serif SC','Microsoft YaHei',serif;
  background:var(--bg);
  background-image: radial-gradient(ellipse at 50% 30%, #2a1f18 0%, #0f0a06 100%);
  color:var(--text);
  min-height:100vh;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}

/* wood-grain header bar */
.top-bar{
  text-align:center;
  padding:18px 20px 8px;
  background:linear-gradient(180deg, rgba(60,30,15,.7) 0%, transparent 100%);
}
.top-bar h1{
  font-size:1.8rem;
  letter-spacing:6px;
  background:linear-gradient(180deg, #f2d279 0%, #b8892e 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 6px rgba(200,150,50,.5));
}
.top-bar .sub{
  font-size:.78rem;
  color:var(--text-dim);
  letter-spacing:4px;
  margin-top:2px;
}

/* step pills */
.steps-row{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:8px 20px 16px;
  flex-wrap:wrap;
}
.step-pill{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 18px;
  border-radius:30px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  font-size:.78rem;
  letter-spacing:1px;
  color:var(--text-dim);
  transition:all .4s ease;
  cursor:pointer;
}
.step-pill .n{
  width:22px;height:22px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;
  background:rgba(255,255,255,.08);
  transition:all .4s ease;
}
.step-pill.active{
  border-color:var(--gold);
  color:#e0c878;
  box-shadow:0 0 20px rgba(180,140,50,.2);
  background:rgba(180,140,50,.08);
}
.step-pill.active .n{
  background:linear-gradient(135deg,#d4a843,#b08020);
  color:#1c1410;
}
.step-pill.done{
  border-color:#5a8a5a;
  color:#8ab88a;
}
.step-pill.done .n{
  background:#4a7a4a;
  color:#fff;
}

/* main grid */
.main-grid{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  max-width:1050px;
  margin:0 auto;
  padding:0 20px 20px;
  min-height:520px;
}

/* panel */
.panel{
  background:var(--surface);
  border-radius:16px;
  border:1px solid var(--border);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.panel h3{
  font-size:.95rem;
  letter-spacing:3px;
  text-align:center;
  color:#d4b060;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.panel .hint{
  font-size:.7rem;
  color:var(--text-dim);
  text-align:center;
  letter-spacing:1px;
}

/* choice cards */
.choice-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.choice-card{
  padding:16px 10px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
  background:rgba(255,255,255,.015);
  transition:all .3s ease;
  position:relative;
  overflow:hidden;
}
.choice-card:hover{
  background:rgba(255,255,255,.04);
}
.choice-card.selected{
  border-color:var(--gold);
  background:rgba(200,160,60,.08);
  box-shadow:0 0 18px rgba(180,140,50,.15);
}
.choice-card .icon{
  font-size:2.2rem;
  margin-bottom:6px;
}
.choice-card .name{
  font-size:.82rem;
  letter-spacing:2px;
}
.choice-card .desc{
  font-size:.65rem;
  color:var(--text-dim);
  margin-top:3px;
}

/* gold / silver big swatches */
.mat-card{
  padding:20px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .35s ease;
}
.mat-card.gold-card{
  background:linear-gradient(145deg, rgba(180,130,30,.25), rgba(120,80,10,.35));
}
.mat-card.silver-card{
  background:linear-gradient(145deg, rgba(180,180,190,.2), rgba(100,100,110,.3));
}
.mat-card:hover{
  transform:translateY(-2px);
}
.mat-card.selected{
  border-color:var(--gold);
  box-shadow:0 0 22px rgba(180,140,50,.25);
}
.mat-card .mat-dot{
  width:48px;height:48px;
  border-radius:50%;
  margin:0 auto 10px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.35), 0 3px 12px rgba(0,0,0,.4);
}
.mat-dot.gold-dot{
  background:linear-gradient(135deg, #fce38a 0%, #e2b44a 30%, #b0761a 70%, #8a5a0c 100%);
}
.mat-dot.silver-dot{
  background:linear-gradient(135deg, #f4f4fa 0%, #d0d0da 30%, #9898a6 70%, #686878 100%);
}
.mat-card .mat-name{
  font-size:.9rem;
  letter-spacing:3px;
}
.mat-card .mat-sub{
  font-size:.68rem;
  color:var(--text-dim);
  margin-top:2px;
}

/* pattern grid */
.pat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.pat-btn{
  aspect-ratio:1;
  border-radius:10px;
  background:rgba(255,255,255,.02);
  border:2px solid transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.4rem;
  transition:all .25s ease;
}
.pat-btn:hover{
  background:rgba(200,160,60,.1);
  border-color:rgba(200,160,60,.2);
}
.pat-btn.active{
  border-color:var(--gold);
  background:rgba(200,160,60,.15);
  box-shadow:0 0 14px rgba(180,140,50,.2);
}

/* slider row */
.ctl-row{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:.75rem;
  letter-spacing:1px;
}
.ctl-row input[type=range]{
  flex:1;
  accent-color:var(--gold);
}
.ctl-row input[type=text]{
  flex:1;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  color:var(--text);
  font-size:.8rem;
  outline:none;
  font-family:inherit;
}
.ctl-row input[type=text]:focus{
  border-color:var(--gold);
}

/* buttons */
.btn{
  padding:9px 18px;
  border-radius:25px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--text);
  cursor:pointer;
  font-size:.78rem;
  letter-spacing:1.5px;
  transition:all .3s ease;
  font-family:inherit;
  text-align:center;
}
.btn:hover{
  border-color:var(--gold);
  color:#e0c060;
}
.btn.primary{
  background:linear-gradient(145deg, #c89630, #9a6e1a);
  border:none;
  color:#fff;
  font-weight:600;
  letter-spacing:2px;
}
.btn.primary:hover{
  box-shadow:0 0 24px rgba(200,150,40,.45);
}
.btn.danger{
  color:var(--danger);
  border-color:rgba(200,120,110,.3);
}
.btn.danger:hover{
  background:rgba(200,120,110,.12);
  border-color:var(--danger);
}
.btn.sm{
  padding:5px 12px;
  font-size:.7rem;
  border-radius:20px;
}

/* canvas area */
.canvas-stage{
  background:var(--surface);
  border-radius:16px;
  border:1px solid var(--border);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  min-height:480px;
}
.canvas-stage canvas{
  display:block;
  cursor:default;
}
.canvas-stage .action-hint{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  font-size:.72rem;
  letter-spacing:2px;
  color:var(--text-dim);
  background:rgba(0,0,0,.55);
  padding:7px 18px;
  border-radius:20px;
  pointer-events:none;
  transition:all .4s ease;
}
.polish-indicator{
  position:absolute;
  top:14px;
  right:18px;
  font-size:.72rem;
  letter-spacing:1px;
  color:var(--gold);
  background:rgba(0,0,0,.5);
  padding:6px 14px;
  border-radius:16px;
  display:none;
}
.polish-indicator .bar-track{
  width:100px;height:5px;
  background:rgba(255,255,255,.1);
  border-radius:3px;
  margin-top:4px;
  overflow:hidden;
}
.polish-indicator .bar-fill{
  height:100%;
  background:linear-gradient(90deg, #b08020, #f2d279);
  border-radius:3px;
  transition:width .25s ease;
}
.final-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
  transition:opacity .6s ease;
}
.final-overlay.show{
  opacity:1;
}
.final-overlay .big-icon{
  font-size:4rem;
  animation:popIn .6s ease-out;
}
.final-overlay h2{
  color:#e0c060;
  letter-spacing:4px;
  margin:10px 0;
  text-shadow:0 0 30px rgba(200,150,50,.45);
}
@keyframes popIn{
  0%{transform:scale(0);opacity:0;}
  65%{transform:scale(1.15);}
  100%{transform:scale(1);opacity:1;}
}

/* bottom nav */
.bottom-nav{
  display:flex;
  justify-content:center;
  gap:14px;
  padding:10px 20px 24px;
  max-width:1050px;
  margin:0 auto;
}

/* particles */
.fx-particle{
  position:fixed;
  pointer-events:none;
  z-index:99;
  font-size:16px;
  animation:fxFly .7s ease-out forwards;
}
@keyframes fxFly{
  0%{opacity:1;transform:translate(0,0) scale(1.2);}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.25);}
}

@media(max-width:768px){
  .main-grid{
    grid-template-columns:1fr;
  }
  .canvas-stage{
    min-height:350px;
    order:-1;
  }
  .top-bar h1{font-size:1.3rem;letter-spacing:4px;}
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>金 银 手 镯 工 坊</h1>
  <p class="sub">选款 · 雕刻 · 打磨 · 珍藏</p>
</div>

<div class="steps-row" id="stepsRow">
  <div class="step-pill active" data-s="0"><span class="n">1</span>选 款</div>
  <div class="step-pill" data-s="1"><span class="n">2</span>选 材</div>
  <div class="step-pill" data-s="2"><span class="n">3</span>雕 刻</div>
  <div class="step-pill" data-s="3"><span class="n">4</span>打 磨</div>
  <div class="step-pill" data-s="4"><span class="n">5</span>鉴 赏</div>
</div>

<div class="main-grid">
  <div class="panel" id="panel"></div>
  <div class="canvas-stage" id="stage">
    <canvas id="c"></canvas>
    <div class="action-hint" id="hint"></div>
    <div class="polish-indicator" id="polishInd">
      抛光进度
      <div class="bar-track"><div class="bar-fill" id="polishBar" style="width:0%"></div></div>
    </div>
    <div class="final-overlay" id="finalOverlay">
      <div class="big-icon">✨</div>
      <h2>匠心之作 · 已珍藏</h2>
      <p style="color:var(--text-dim);letter-spacing:2px;">独一无二的手工手镯</p>
    </div>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>

<script>
// ===================== STATE =====================
const S = {
  step: 0,
  style: 'cuff',     // cuff | round | wide
  material: 'gold',  // gold | silver
  engravings: [],    // {x, y, pat, size}
  currentPat: '如意',
  patSize: 24,
  customText: '福',
  freeDraw: false,
  freeStrokes: [],   // [{pts:[], size}]
  polishCanvas: null,
  polishCtx: null,
  polishPct: 0,
  isPolishing: false,
  isDrawing: false,
  currentStroke: null,
};

const STYLES = {
  cuff:  { icon:'🟤', name:'开口镯', desc:'经典C形开口', draw:drawCuff, innerRatio:0.6 },
  round: { icon:'⭕', name:'圆环镯', desc:'闭合素圈',   draw:drawRound, innerRatio:0.62 },
  wide:  { icon:'🟫', name:'宽版镯', desc:'宽面大气',   draw:drawWide, innerRatio:0.48 },
};

const PATTERNS = [
  { id:'如意', glyph:'☁️', label:'如意纹' },
  { id:'回纹', glyph:'🔲', label:'回纹' },
  { id:'莲花', glyph:'🪷', label:'莲花' },
  { id:'竹节', glyph:'🎋', label:'竹节' },
  { id:'福字', glyph:'福', label:'福字' },
  { id:'梅花', glyph:'🌸', label:'梅花' },
  { id:'心形', glyph:'♡',  label:'心形' },
  { id:'星辉', glyph:'✧',  label:'星辉' },
  { id:'水波', glyph:'〰️', label:'水波' },
  { id:'龙凤', glyph:'🐉', label:'龙凤' },
  { id:'日纹', glyph:'☀️', label:'日纹' },
  { id:'双线', glyph:'‖',  label:'双线' },
  { id:'__text__', glyph:'📝', label:'文字' },
];

// ===================== DOM =====================
const panel = document.getElementById('panel');
const bottomNav = document.getElementById('bottomNav');
const stage = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const polishInd = document.getElementById('polishInd');
const polishBar = document.getElementById('polishBar');
const finalOverlay = document.getElementById('finalOverlay');
const pills = document.querySelectorAll('.step-pill');

let W, H, CX, CY, R; // canvas dimensions & bracelet center/radius

// ===================== CANVAS SETUP =====================
function resize(){
  const rect = stage.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const sz = Math.min(rect.width - 16, rect.height - 16, 540);
  W = sz; H = sz;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const c = canvas.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2; CY = H / 2; R = Math.min(W, H) * 0.36;

  // Reset polish canvas
  const pc = document.createElement('canvas');
  pc.width = W; pc.height = H;
  S.polishCanvas = pc;
  S.polishCtx = pc.getContext('2d');
  S.polishCtx.fillStyle = '#000';
  S.polishCtx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', () => { resize(); resetPolish(); renderAll(); });

function resetPolish(){
  if (!S.polishCtx) return;
  S.polishCtx.fillStyle = '#000';
  S.polishCtx.fillRect(0, 0, W, H);
  S.polishPct = 0;
  polishBar.style.width = '0%';
}

// ===================== MATERIAL COLORS =====================
// Carefully calibrated for realistic gold & silver
const MAT = {
  gold: {
    base:     '#d4a43a',
    light:    '#f5d98a',
    bright:   '#fffbe8',
    dark:     '#8a5c10',
    shadow:   '#3d2202',
    mid:      '#c09028',
    midLight: '#e6c860',
    rimLight: '#fdf0c0',
    rimDark:  '#6b3f06',
    engraveDark:'#5a2e04',
    engraveLight:'#fde898',
    ambient:  '#3a1e04',
  },
  silver: {
    base:     '#c4c4ce',
    light:    '#e8e8ef',
    bright:   '#fdfdfe',
    dark:     '#6e6e7a',
    shadow:   '#303038',
    mid:      '#aaaab4',
    midLight: '#d4d4dc',
    rimLight: '#f4f4f8',
    rimDark:  '#50505a',
    engraveDark:'#3e3e48',
    engraveLight:'#e6e6ed',
    ambient:  '#282830',
  },
};

// ===================== BRACELET DRAWING =====================
function isOnBracelet(x, y){
  const d = Math.sqrt((x-CX)**2 + (y-CY)**2);
  const info = STYLES[S.style];
  const inner = R * (info.innerRatio || 0.6);
  const outer = R * 1.04;
  return d >= inner - 4 && d <= outer + 4;
}

// Pre-generate wood grain once (not random per frame)
let _woodGrain = null;
function getWoodGrain(){
  if (_woodGrain) return _woodGrain;
  const c = document.createElement('canvas');
  c.width = 600; c.height = 600;
  const g = c.getContext('2d');
  g.fillStyle = '#1a1208';
  g.fillRect(0, 0, 600, 600);
  g.globalAlpha = 0.04;
  g.strokeStyle = '#8a6040';
  for (let i = 0; i < 14; i++){
    const baseY = (i / 14) * 600;
    g.beginPath();
    g.moveTo(0, baseY + Math.sin(i*2.1)*15);
    for (let x = 0; x < 600; x += 15){
      g.lineTo(x, baseY + Math.sin(x*0.007 + i)*12 + Math.sin(x*0.018)*5);
    }
    g.lineWidth = 1.2 + (i % 3) * 1.0;
    g.stroke();
  }
  g.globalAlpha = 1;
  _woodGrain = c;
  return _woodGrain;
}

function drawWorkbench(){
  // Dark velvet/wood surface
  const grad = ctx.createRadialGradient(CX, CY, R*0.3, CX, CY, W*0.7);
  grad.addColorStop(0, '#231a12');
  grad.addColorStop(0.5, '#191008');
  grad.addColorStop(1, '#0a0604');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Wood grain overlay
  const grain = getWoodGrain();
  ctx.drawImage(grain, 0, 0, W, H);

  // Vignette
  const vg = ctx.createRadialGradient(CX, CY, R*0.65, CX, CY, W*0.7);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function drawCastShadow(outerR, innerR){
  ctx.save();
  // Multiple shadow layers for realism
  for (let i = 0; i < 3; i++){
    ctx.shadowColor = `rgba(0,0,0,${0.25 - i*0.06})`;
    ctx.shadowBlur = 14 + i * 6;
    ctx.shadowOffsetX = 4 + i;
    ctx.shadowOffsetY = 6 + i * 1.5;
    ctx.fillStyle = 'rgba(0,0,0,0.01)';
    ctx.beginPath();
    ctx.arc(CX, CY, outerR, 0, Math.PI*2);
    if (innerR > 0) ctx.arc(CX, CY, innerR, 0, Math.PI*2, true);
    ctx.fill();
  }
  ctx.restore();
}

function makeMetalGradient(mat){
  // Photorealistic metal cylinder gradient
  // Light comes from upper-left, creating a diagonal highlight band
  const grad = ctx.createLinearGradient(CX - R, CY - R, CX + R, CY + R);
  grad.addColorStop(0,   mat.bright);
  grad.addColorStop(0.06, mat.light);
  grad.addColorStop(0.15, mat.midLight);
  grad.addColorStop(0.28, mat.base);
  grad.addColorStop(0.38, mat.dark);
  grad.addColorStop(0.44, mat.ambient);
  grad.addColorStop(0.48, mat.mid);
  grad.addColorStop(0.52, mat.rimLight);
  grad.addColorStop(0.58, mat.light);
  grad.addColorStop(0.65, mat.base);
  grad.addColorStop(0.78, mat.dark);
  grad.addColorStop(0.88, mat.shadow);
  grad.addColorStop(0.95, mat.mid);
  grad.addColorStop(1,   mat.dark);
  return grad;
}

function drawBrushedTexture(mat){
  // Subtle radial brushed metal lines - scale with actual bracelet dimensions
  const info = STYLES[S.style];
  const innerR = R * (info.innerRatio || 0.6);
  const outerR = R * 1.02;
  const count = Math.floor(R * 1.2);
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = mat.dark;
  ctx.lineWidth = 0.4;
  for (let i = 0; i < count; i++){
    const angle = (i / count) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(angle) * innerR, CY + Math.sin(angle) * innerR);
    ctx.lineTo(CX + Math.cos(angle) * outerR, CY + Math.sin(angle) * outerR);
    ctx.stroke();
  }
  ctx.restore();
}

// --- Cuff: thick stroked arc with round caps (clean, realistic) ---
function drawCuff(mat){
  const outerR = R;
  const innerR = R * (STYLES.cuff.innerRatio || 0.6);
  const midR = (outerR + innerR) / 2;
  const bandW = outerR - innerR;
  const gap = Math.PI * 0.38;
  const startA = -Math.PI/2 + gap/2;
  const endA   =  Math.PI*1.5 - gap/2;

  ctx.save();
  drawCastShadow(outerR, innerR);

  // --- Brushed base layer ---
  const baseGrad = makeMetalGradient(mat);
  ctx.fillStyle = baseGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR, startA, endA);
  ctx.arc(CX, CY, innerR, endA, startA, true);
  ctx.closePath();
  ctx.fill();

  // --- Brushed texture ---
  drawBrushedTexture(mat);

  // --- Environment reflection band ---
  ctx.globalAlpha = 0.07;
  const envGrad = ctx.createLinearGradient(CX - R, CY - R*0.4, CX + R*0.3, CY + R*0.6);
  envGrad.addColorStop(0, '#fff');
  envGrad.addColorStop(0.3, 'transparent');
  envGrad.addColorStop(0.5, '#000');
  envGrad.addColorStop(0.7, 'transparent');
  envGrad.addColorStop(1, '#fff');
  ctx.fillStyle = envGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR, startA, endA);
  ctx.arc(CX, CY, innerR, endA, startA, true);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // --- Rounded end highlights ---
  for (const a of [startA, endA]){
    const ex = CX + Math.cos(a) * midR;
    const ey = CY + Math.sin(a) * midR;
    const eg = ctx.createRadialGradient(ex, ey, bandW*0.15, ex, ey, bandW*0.55);
    eg.addColorStop(0, mat.rimLight);
    eg.addColorStop(0.5, mat.base);
    eg.addColorStop(1, mat.dark);
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.arc(ex, ey, bandW*0.52, 0, Math.PI*2);
    ctx.fill();
  }

  // --- Outer rim bright edge ---
  ctx.strokeStyle = mat.rimLight;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR - 0.5, startA, endA);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // --- Inner rim dark edge ---
  ctx.strokeStyle = mat.shadow;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(CX, CY, innerR + 0.5, startA, endA);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// --- Round bangle ---
function drawRound(mat){
  const outerR = R;
  const innerR = R * (STYLES.round.innerRatio || 0.62);
  ctx.save();
  drawCastShadow(outerR, innerR);

  const grad = makeMetalGradient(mat);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR, 0, Math.PI*2);
  ctx.arc(CX, CY, innerR, 0, Math.PI*2, true);
  ctx.fill();

  drawBrushedTexture(mat);

  // Environment reflection
  ctx.globalAlpha = 0.06;
  const envGrad = ctx.createLinearGradient(CX - R, CY - R*0.3, CX + R*0.4, CY + R*0.5);
  envGrad.addColorStop(0, '#fff');
  envGrad.addColorStop(0.25, 'transparent');
  envGrad.addColorStop(0.45, '#000');
  envGrad.addColorStop(0.65, 'transparent');
  envGrad.addColorStop(1, '#fff');
  ctx.fillStyle = envGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR, 0, Math.PI*2);
  ctx.arc(CX, CY, innerR, 0, Math.PI*2, true);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Outer rim
  ctx.strokeStyle = mat.rimLight;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.45;
  ctx.beginPath(); ctx.arc(CX, CY, outerR - 0.5, 0, Math.PI*2); ctx.stroke();
  // Inner rim
  ctx.strokeStyle = mat.shadow;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.25;
  ctx.beginPath(); ctx.arc(CX, CY, innerR + 0.5, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// --- Wide band ---
function drawWide(mat){
  const outerR = R;
  const innerR = R * (STYLES.wide.innerRatio || 0.48);
  ctx.save();
  drawCastShadow(outerR, innerR);

  const grad = makeMetalGradient(mat);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR, 0, Math.PI*2);
  ctx.arc(CX, CY, innerR, 0, Math.PI*2, true);
  ctx.fill();

  drawBrushedTexture(mat);

  // Environment reflection
  ctx.globalAlpha = 0.05;
  const envGrad = ctx.createLinearGradient(CX - R, CY - R*0.2, CX + R*0.5, CY + R*0.6);
  envGrad.addColorStop(0, '#fff');
  envGrad.addColorStop(0.2, 'transparent');
  envGrad.addColorStop(0.4, '#000');
  envGrad.addColorStop(0.6, 'transparent');
  envGrad.addColorStop(1, '#fff');
  ctx.fillStyle = envGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, outerR, 0, Math.PI*2);
  ctx.arc(CX, CY, innerR, 0, Math.PI*2, true);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Rims
  ctx.strokeStyle = mat.rimLight;
  ctx.lineWidth = 1.8;
  ctx.globalAlpha = 0.45;
  ctx.beginPath(); ctx.arc(CX, CY, outerR - 1, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = mat.shadow;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.25;
  ctx.beginPath(); ctx.arc(CX, CY, innerR + 1, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ===================== ENGRAVING RENDERING =====================
// Simulates a V-groove carved into metal:
//   - Dark shadow on the "inside" edge (bottom-right from light)
//   - Bright catch-light on the "outside" edge (top-left toward light)
//   - Dark recessed center
function drawEngraving(eng, mat){
  const {x, y, pat, size} = eng;
  const lightDX = -0.7, lightDY = -0.7; // light from upper-left
  const shadowDX = 1.0, shadowDY = 1.0;

  ctx.save();

  // 1. Shadow edge (deepest recess, away from light)
  ctx.fillStyle = mat.engraveDark;
  ctx.globalAlpha = 0.5;
  drawPatternGlyph(x + shadowDX, y + shadowDY, pat, size);

  // 2. Catch-light edge (toward light source)
  ctx.fillStyle = mat.engraveLight;
  ctx.globalAlpha = 0.45;
  drawPatternGlyph(x + lightDX, y + lightDY, pat, size);

  // 3. Main groove interior
  ctx.fillStyle = mat.engraveDark;
  ctx.globalAlpha = 0.55;
  drawPatternGlyph(x, y, pat, size);

  ctx.restore();
}

const GLYPH_MAP = {
  '如意':'☁️', '回纹':'🔲', '莲花':'🪷', '竹节':'🎋',
  '福字':'福', '心形':'♡', '星辉':'✧', '水波':'〰️',
  '龙凤':'🐉', '梅花':'🌸', '日纹':'☀️', '双线':'‖',
};

function drawPatternGlyph(x, y, pat, size){
  ctx.font = `${size}px "PingFang SC","Noto Serif SC","Microsoft YaHei",serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // __text__ uses customText from state
  const g = pat === '__text__' ? S.customText : (GLYPH_MAP[pat] || pat);

  // Emoji need slightly larger rendering
  if (g.length >= 2 && /[\uD800-\uDBFF]/.test(g)){
    ctx.font = `${size * 1.25}px "PingFang SC","Noto Serif SC","Microsoft YaHei",serif`;
  }
  ctx.fillText(g, x, y);
}

function drawFreeStroke(stroke, mat){
  if (stroke.pts.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const pts = stroke.pts;
  const sz = stroke.size;

  // 1. Shadow groove offset (bottom-right)
  ctx.strokeStyle = mat.engraveDark;
  ctx.lineWidth = sz;
  ctx.globalAlpha = 0.45;
  ctx.beginPath();
  ctx.moveTo(pts[0].x + 0.8, pts[0].y + 0.8);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x + 0.8, pts[i].y + 0.8);
  ctx.stroke();

  // 2. Catch-light offset (top-left)
  ctx.strokeStyle = mat.engraveLight;
  ctx.lineWidth = sz * 0.7;
  ctx.globalAlpha = 0.38;
  ctx.beginPath();
  ctx.moveTo(pts[0].x - 0.6, pts[0].y - 0.6);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x - 0.6, pts[i].y - 0.6);
  ctx.stroke();

  // 3. Main groove
  ctx.strokeStyle = mat.engraveDark;
  ctx.lineWidth = sz * 0.6;
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  ctx.restore();
}

// ===================== POLISH EFFECT =====================
function applyPolishEffects(mat){
  if (!S.polishCtx) return;

  // Sample polish map at reduced resolution for performance
  const pw = S.polishCanvas.width, ph = S.polishCanvas.height;
  const imgData = S.polishCtx.getImageData(0, 0, pw, ph);
  const data = imgData.data;

  // Count polished pixels (sample every 4th pixel)
  let polished = 0, total = 0;
  for (let i = 0; i < data.length; i += 16){
    if (data[i] > 0) polished++;
    total++;
  }
  S.polishPct = Math.round((polished / Math.max(total, 1)) * 100);
  polishBar.style.width = S.polishPct + '%';

  // --- Mirror specular reflection (appears as surface gets polished) ---
  const polishAlpha = S.polishPct / 100;

  // Soft mirror sheen
  ctx.save();
  const sheenGrad = ctx.createLinearGradient(CX - R*0.8, CY - R*0.6, CX + R*0.6, CY + R*0.4);
  sheenGrad.addColorStop(0, `rgba(255,255,255,${polishAlpha * 0.12})`);
  sheenGrad.addColorStop(0.3, `rgba(255,255,255,${polishAlpha * 0.04})`);
  sheenGrad.addColorStop(0.44, `rgba(255,255,255,${polishAlpha * 0.22})`);
  sheenGrad.addColorStop(0.5, `rgba(255,255,255,${polishAlpha * 0.35})`);
  sheenGrad.addColorStop(0.56, `rgba(255,255,255,${polishAlpha * 0.18})`);
  sheenGrad.addColorStop(0.7, `rgba(255,255,255,${polishAlpha * 0.04})`);
  sheenGrad.addColorStop(1, `rgba(255,255,255,${polishAlpha * 0.08})`);

  const info = STYLES[S.style];
  const innerR = R * (info.innerRatio || 0.6);
  const outerR = R;

  // Apply only to bracelet area via clip
  ctx.beginPath();
  if (S.style === 'cuff'){
    const gap = Math.PI * 0.38;
    const startA = -Math.PI/2 + gap/2;
    const endA   =  Math.PI*1.5 - gap/2;
    ctx.arc(CX, CY, outerR, startA, endA);
    ctx.arc(CX, CY, innerR, endA, startA, true);
    ctx.closePath();
  } else {
    ctx.arc(CX, CY, outerR, 0, Math.PI*2);
    ctx.arc(CX, CY, innerR, 0, Math.PI*2, true);
    ctx.closePath();
  }
  ctx.clip();

  // Fill with sheen
  ctx.fillStyle = sheenGrad;
  ctx.fillRect(CX - R, CY - R, R*2, R*2);

  // Sharp specular streak for highly polished areas
  if (polishAlpha > 0.3){
    ctx.globalAlpha = Math.min((polishAlpha - 0.3) * 1.5, 0.35);
    const streakGrad = ctx.createLinearGradient(CX - R, CY - R*0.25, CX + R, CY + R*0.35);
    streakGrad.addColorStop(0, 'transparent');
    streakGrad.addColorStop(0.38, 'transparent');
    streakGrad.addColorStop(0.44, '#ffffff');
    streakGrad.addColorStop(0.5, '#ffffff');
    streakGrad.addColorStop(0.56, 'transparent');
    streakGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = streakGrad;
    ctx.fillRect(CX - R, CY - R, R*2, R*2);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Update live percentage in panel
  const pctEl = document.getElementById('polishLivePct');
  if (pctEl) pctEl.textContent = S.polishPct + '%';
}

// ===================== MAIN RENDER =====================
function render(){
  ctx.clearRect(0, 0, W, H);
  const mat = MAT[S.material];

  drawWorkbench();

  // Draw bracelet
  STYLES[S.style].draw(mat);

  // Draw free strokes (below stamps for layering)
  S.freeStrokes.forEach(s => drawFreeStroke(s, mat));

  // Draw stamp engravings
  S.engravings.forEach(e => drawEngraving(e, mat));

  // Polish effects
  if (S.step >= 3){
    applyPolishEffects(mat);
  }
}

}

// ===================== BOTTOM NAV =====================
function renderBottomNav(){
  const steps = [
    { prev:null,     next:'选材质 →', prevLabel:null },
    { prev:'← 镯形', next:'雕刻纹样 →', prevLabel:'← 镯形' },
    { prev:'← 材质', next:'打磨抛光 →', prevLabel:'← 材质' },
    { prev:'← 雕刻', next:'✨ 完成鉴赏', prevLabel:'← 雕刻' },
    { prev:null,     next:null, prevLabel:null },
  ];
  const s = steps[S.step];
  bottomNav.innerHTML = `
    ${s.prev ? `<button class="btn" id="prevBtn">${s.prevLabel}</button>` : ''}
    ${s.next ? `<button class="btn primary" id="nextBtn">${s.next}</button>` : ''}
  `;
  document.getElementById('prevBtn')?.addEventListener('click', () => {
    if (S.step > 0){ S.step--; updateStep(); }
  });
  document.getElementById('nextBtn')?.addEventListener('click', () => {
    if (S.step < 4){ S.step++; updateStep(); }
  });
}

// ===================== STEP MANAGEMENT =====================
function updateStep(){
  pills.forEach((p, i) => {
    p.classList.remove('active','done');
    if (i < S.step) p.classList.add('done');
    if (i === S.step) p.classList.add('active');
  });

  polishInd.style.display = S.step >= 3 ? 'block' : 'none';
  finalOverlay.classList.toggle('show', S.step === 4);

  if (S.step === 2){
    hint.textContent = S.freeDraw ? '✍️ 按住鼠标在手镯上自由雕刻' : '👆 点击手镯表面来刻印纹样';
    hint.style.display = 'block';
    canvas.style.cursor = S.freeDraw ? 'crosshair' : 'pointer';
  } else if (S.step === 3){
    hint.textContent = '🖐️ 在手镯表面拖动来抛光打磨';
    hint.style.display = 'block';
    canvas.style.cursor = 'grab';
  } else {
    hint.style.display = 'none';
    canvas.style.cursor = 'default';
  }

  renderPanel();
  renderBottomNav();
  render();
}

function renderAll(){
  renderPanel();
  renderBottomNav();
  render();
}

function restart(){
  S.step = 0;
  S.style = 'cuff';
  S.material = 'gold';
  S.engravings = [];
  S.freeStrokes = [];
  S.currentPat = '如意';
  S.patSize = 24;
  S.customText = '福';
  S.freeDraw = false;
  S.currentStroke = null;
  resetPolish();
  finalOverlay.classList.remove('show');
  polishInd.style.display = 'none';
  updateStep();
  renderAll();
}

// ===================== CANVAS INTERACTION =====================
function canvasPos(e){
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height),
  };
}

canvas.addEventListener('click', e => {
  if (S.step !== 2 || S.freeDraw) return;
  const {x, y} = canvasPos(e);
  if (!isOnBracelet(x, y)) return;

  // Use currentPat directly (__text__ handled in drawPatternGlyph)
  const pat = S.currentPat || '如意';
  S.engravings.push({x, y, pat, size: S.patSize});
  render();
  spawnFX(e.clientX, e.clientY, '✨');
});

// Free draw
canvas.addEventListener('mousedown', e => {
  if (S.step === 2 && S.freeDraw){
    S.isDrawing = true;
    const {x, y} = canvasPos(e);
    if (isOnBracelet(x, y)){
      S.currentStroke = {pts:[{x,y}], size: S.patSize * 0.5};
      S.freeStrokes.push(S.currentStroke);
    }
  }
  if (S.step === 3){
    S.isPolishing = true;
    polishAt(e);
  }
});
canvas.addEventListener('mousemove', e => {
  if (S.isDrawing && S.currentStroke){
    const {x, y} = canvasPos(e);
    if (isOnBracelet(x, y)){
      S.currentStroke.pts.push({x, y});
      render();
    }
  }
  if (S.isPolishing){
    polishAt(e);
  }
});
canvas.addEventListener('mouseup', () => {
  S.isDrawing = false;
  S.currentStroke = null;
  S.isPolishing = false;
});
canvas.addEventListener('mouseleave', () => {
  S.isDrawing = false;
  S.currentStroke = null;
  S.isPolishing = false;
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (S.step === 2 && !S.freeDraw){
    const {x, y} = canvasPos(t);
    if (!isOnBracelet(x, y)) return;
    const pat = S.currentPat || '如意';
    S.engravings.push({x, y, pat, size: S.patSize});
    render();
    spawnFX(t.clientX, t.clientY, '✨');
  }
  if (S.step === 2 && S.freeDraw){
    S.isDrawing = true;
    const {x, y} = canvasPos(t);
    if (isOnBracelet(x, y)){
      S.currentStroke = {pts:[{x,y}], size: S.patSize * 0.5};
      S.freeStrokes.push(S.currentStroke);
    }
  }
  if (S.step === 3){
    S.isPolishing = true;
    polishAtTouch(e);
  }
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (S.isDrawing && S.currentStroke){
    const {x, y} = canvasPos(e.touches[0]);
    if (isOnBracelet(x, y)){
      S.currentStroke.pts.push({x, y});
      render();
    }
  }
  if (S.isPolishing){
    polishAtTouch(e);
  }
}, {passive: false});
canvas.addEventListener('touchend', () => {
  S.isDrawing = false; S.currentStroke = null; S.isPolishing = false;
});

function polishAt(e){
  const {x, y} = canvasPos(e);
  S.polishCtx.fillStyle = '#fff';
  S.polishCtx.beginPath();
  S.polishCtx.arc(x, y, 20, 0, Math.PI*2);
  S.polishCtx.fill();
  render();
  const pct = document.getElementById('polishLivePct');
  if (pct) pct.textContent = S.polishPct + '%';
  if (Math.random() < 0.4) spawnFX(e.clientX, e.clientY, '💫');
}

function polishAtTouch(e){
  const t = e.touches[0];
  const {x, y} = canvasPos(t);
  S.polishCtx.fillStyle = '#fff';
  S.polishCtx.beginPath();
  S.polishCtx.arc(x, y, 24, 0, Math.PI*2);
  S.polishCtx.fill();
  render();
  const pct = document.getElementById('polishLivePct');
  if (pct) pct.textContent = S.polishPct + '%';
  if (Math.random() < 0.4) spawnFX(t.clientX, t.clientY, '💫');
}

// ===================== EFFECTS =====================
function spawnFX(x, y, glyph){
  const el = document.createElement('div');
  el.className = 'fx-particle';
  el.textContent = glyph;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.setProperty('--dx', (Math.random()*40-20)+'px');
  el.style.setProperty('--dy', (Math.random()*-50-20)+'px');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// ===================== SAVE =====================
function saveImg(){
  const link = document.createElement('a');
  link.download = '手工手镯.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ===================== STEP PILL CLICKS =====================
pills.forEach(p => {
  p.addEventListener('click', () => {
    const ts = +p.dataset.s;
    if (ts <= S.step + 1){
      S.step = ts;
      updateStep();
    }
  });
});

// ===================== INIT =====================
function init(){
  resize();
  resetPolish();
  updateStep();
  renderAll();
}

window.addEventListener('resize', () => {
  resize();
  resetPolish();
  S.engravings = [];
  S.freeStrokes = [];
  renderAll();
});

init();
</script>
</body>
</html>
